<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMOS HSE Safety Induction</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 16px;
  width: 90%;
  max-width: 1000px;
  text-align: center;
}

.video-wrapper {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  height: 0;
  border-radius: 12px;
  overflow: hidden;
  background: black;
  margin-bottom: 20px;
}

#player {
  position: absolute;
  top: 0;       
  left: 0;
  width: 100%;
  height: 100%;
}

button {
  padding: 12px 24px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

#nextBtn:disabled {
  background: gray;
  cursor: not-allowed;
}
</style>
</head>

<body>

<div class="container">

<h2>🏗️ DMOS HSE Safety Induction Video</h2>
<p id="progress">Video 1 of 3</p>

<div class="video-wrapper">
  <div id="player"></div>
</div>

<button onclick="prevVideo()">Back</button>
<button id="nextBtn" disabled onclick="nextVideo()">Next</button>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let currentVideo = 0;

const videos = [
  "8Gm9CrnnP_k",
  "dKLdwV0qSZw",
  "fY3s4CBAhn4"
];

// Load YouTube player
function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    videoId: videos[currentVideo],
    events: {
      'onStateChange': onPlayerStateChange
    }
  });
}

// Detect video end
function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.ENDED) {
    document.getElementById("nextBtn").disabled = false;
  }
}

// Next video
function nextVideo() {
  currentVideo++;

  if (currentVideo < videos.length) {
    player.loadVideoById(videos[currentVideo]);
    document.getElementById("nextBtn").disabled = true;
    document.getElementById("progress").innerText =
      `Video ${currentVideo + 1} of ${videos.length}`;
  } else {
    startQuiz();
  }
}

// Previous video
function prevVideo() {
  if (currentVideo > 0) {
    currentVideo--;
    player.loadVideoById(videos[currentVideo]);
    document.getElementById("nextBtn").disabled = false;
    document.getElementById("progress").innerText =
      `Video ${currentVideo + 1} of ${videos.length}`;
  }
}

// Quiz redirect
function startQuiz() {
  const quizzes = [
    "https://forms.office.com/r/XRkmibFvHQ",
    "https://forms.office.com/r/Dpnbz24J9s",
    "https://forms.office.com/r/u6RECy8yxg"
  ];

  const randomIndex = Math.floor(Math.random() * quizzes.length);
  window.location.href = quizzes[randomIndex];
}
</script>

</body>
</html>
