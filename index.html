<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMOS HSE Safety Induction</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 1000px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      text-align: center;
    }

    h1 {
      margin: 0;
      color: #2c5364;
    }

    .subtitle {
      color: #666;
      margin-bottom: 15px;
    }

    .progress {
      margin: 10px 0 20px;
      font-size: 14px;
      color: #888;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      border-radius: 12px;
      overflow: hidden;
      background: black;
      margin-bottom: 20px;
    }

.video-wrapper iframe {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  transform: translate(-50%, -50%);
}

    .btn {
      padding: 12px 24px;
      font-size: 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin: 5px;
      transition: 0.3s;
    }

    .btn-back {
      background-color: #6c757d;
      color: white;
    }

    .btn-next {
      background-color: #2c5364;
      color: white;
    }

    .btn-start {
      background-color: #28a745;
      color: white;
    }

    .btn:hover {
      opacity: 0.85;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🏗️ DMOS HSE Safety Induction Video</h1>
  <p class="subtitle">Please watch all videos before proceeding to the quiz.</p>

  <div class="progress" id="progressText">
    Video 1 of 3
  </div>

  <div class="video-wrapper">
    <iframe id="videoFrame"
      src="https://www.youtube.com/embed/8Gm9CrnnP_k"
      allowfullscreen>
    </iframe>
  </div>

  <div id="controls">
    <button class="btn btn-back" onclick="prevVideo()">Back</button>
    <button class="btn btn-next" onclick="nextVideo()">Next</button>
  </div>

</div>

<script>
let currentVideo = 0;

const videos = [
  "https://www.youtube.com/embed/8Gm9CrnnP_k",
  "https://www.youtube.com/embed/dKLdwV0qSZw",
  "https://www.youtube.com/embed/fY3s4CBAhn4"
];

function updateUI() {
  const frame = document.getElementById("videoFrame");
  const progress = document.getElementById("progressText");
  const controls = document.getElementById("controls");

  frame.src = videos[currentVideo];
  progress.innerText = `Video ${currentVideo + 1} of ${videos.length}`;

  if (currentVideo === videos.length - 1) {
    controls.innerHTML = `
      <button class="btn btn-back" onclick="prevVideo()">Back</button>
      <button class="btn btn-start" onclick="startQuiz()">Start Quiz</button>
    `;
  } else {
    controls.innerHTML = `
      <button class="btn btn-back" onclick="prevVideo()">Back</button>
      <button class="btn btn-next" onclick="nextVideo()">Next</button>
    `;
  }
}

function nextVideo() {
  if (currentVideo < videos.length - 1) {
    currentVideo++;
    updateUI();
  }
}

function prevVideo() {
  if (currentVideo > 0) {
    currentVideo--;
    updateUI();
  }
}

function startQuiz() {
  const quizzes = [
    "https://forms.office.com/r/XRkmibFvHQ",
    "https://forms.office.com/r/Dpnbz24J9s",
    "https://forms.office.com/r/u6RECy8yxg"
  ];

  const randomIndex = Math.floor(Math.random() * quizzes.length);
  window.location.href = quizzes[randomIndex];
}
</script>

</body>
</html>

</body>
</html>
